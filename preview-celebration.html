<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Helm — Full Sail Celebration Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F3EE;
    --surface: #FFFFFF;
    --text: #1B1F24;
    --muted: #5C6670;
    --accent: #E4572E;
    --accent-soft: #FDE8DA;
  }
  body.dark {
    --bg: #1E2126;
    --surface: #2A2E35;
    --text: #E8E6E3;
    --muted: #9CA3AF;
    --accent-soft: #3A2520;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, sans-serif;
    background: #d6d2cc;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }
  .device {
    width: 390px;
    height: 750px;
    background: var(--bg);
    border-radius: 44px;
    border: 8px solid #111;
    overflow: hidden;
    position: relative;
    box-shadow: 0 30px 60px rgba(0,0,0,0.25);
  }
  .controls {
    margin-top: 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  .controls button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 22px;
    border-radius: 10px;
    font: 600 15px/1 "Space Grotesk", sans-serif;
    cursor: pointer;
  }
  .controls button.secondary { background: #444; }
  .controls label {
    font: 14px/1 "Space Grotesk", sans-serif;
    color: #333;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .behind {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font: 14px/1.4 "Space Grotesk", sans-serif;
    text-align: center;
    padding: 40px;
  }

  .scrim {
    position: absolute;
    inset: 0;
    background: rgba(11, 22, 35, 0.78);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
  }
  .scrim.show {
    pointer-events: auto;
    animation: scrimIn 400ms ease-out forwards;
  }

  .card {
    width: 100%;
    max-width: 340px;
    background: var(--surface);
    border-radius: 24px;
    padding: 28px 24px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    overflow: hidden;
  }

  /* ========== LOGO STAGE ========== */
  .stage {
    width: 100%;
    height: 200px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .logo-wrap {
    position: relative;
    width: 200px;
    height: 200px;
    transform: scale(0);
    opacity: 0;
  }
  .scrim.show .logo-wrap {
    animation: logoEntrance 700ms cubic-bezier(0.34, 1.56, 0.64, 1) 200ms forwards;
  }

  .logo-svg {
    display: block;
    width: 100%;
    height: 100%;
  }

  .wheel {
    transform-origin: 100px 100px;
    animation: wheelSpin 8s linear infinite;
  }

  /* ========== TEXT + CTA ========== */
  .headline,
  .subhead,
  .cta { opacity: 0; }
  .scrim.show .headline { animation: fadeUp 450ms ease-out 600ms forwards; }
  .scrim.show .subhead  { animation: fadeUp 450ms ease-out 950ms forwards; }
  .scrim.show .cta      { animation: fadeIn 400ms ease-out 1400ms forwards; }

  .headline {
    font: 700 28px/34px "Space Grotesk", sans-serif;
    color: var(--text);
    text-align: center;
    margin: 0;
    letter-spacing: -0.5px;
  }
  .subhead {
    font: 500 16px/22px "Space Grotesk", sans-serif;
    color: var(--muted);
    text-align: center;
    margin: 0;
    letter-spacing: 0.2px;
  }
  .cta {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px;
    width: 100%;
    font: 600 17px/1 "Space Grotesk", sans-serif;
    cursor: pointer;
    margin-top: 4px;
    letter-spacing: 0.3px;
  }

  /* ========== KEYFRAMES ========== */
  @keyframes scrimIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes logoEntrance {
    from { opacity: 0; transform: scale(0); }
    60%  { opacity: 1; }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes wheelSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Reduced motion */
  body.reduce-motion .scrim.show .logo-wrap {
    animation: fadeIn 250ms ease-out forwards !important;
    transform: scale(1) !important;
  }
  body.reduce-motion .wheel {
    animation: none !important;
  }
  body.reduce-motion .scrim.show .headline,
  body.reduce-motion .scrim.show .subhead,
  body.reduce-motion .scrim.show .cta {
    animation: fadeIn 250ms ease-out forwards !important;
    transform: none !important;
  }
</style>
</head>
<body>
  <div class="device">
    <div class="behind">
      <div>
        <div style="font-size: 13px; text-transform: uppercase; letter-spacing: 0.4px; opacity: 0.6;">Mock app screen</div>
        <div style="margin-top: 8px; font-size: 17px; font-weight: 500;">After tapping Subscribe</div>
      </div>
    </div>

    <div class="scrim" id="scrim">
      <div class="card">
        <div class="stage">
          <div class="logo-wrap">
            <svg class="logo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <!-- Wheel (spinning) -->
              <g class="wheel">
                <!-- 8 spokes (drawn first so the rim covers their middle, leaving handles outside) -->
                <g stroke="var(--accent)" stroke-width="14" stroke-linecap="round">
                  <line x1="100" y1="100" x2="100" y2="14"/>
                  <line x1="100" y1="100" x2="100" y2="186"/>
                  <line x1="100" y1="100" x2="14"  y2="100"/>
                  <line x1="100" y1="100" x2="186" y2="100"/>
                  <line x1="100" y1="100" x2="39"  y2="39"/>
                  <line x1="100" y1="100" x2="161" y2="39"/>
                  <line x1="100" y1="100" x2="39"  y2="161"/>
                  <line x1="100" y1="100" x2="161" y2="161"/>
                </g>

                <!-- Outer rim (donut shape via fill-rule="evenodd") -->
                <path
                  d="M 100 30 A 70 70 0 1 0 100 170 A 70 70 0 1 0 100 30 Z M 100 46 A 54 54 0 1 1 100 154 A 54 54 0 1 1 100 46 Z"
                  fill="var(--accent)"
                  fill-rule="evenodd"/>

                <!-- Hub: solid disc with hollow centre matching card background -->
                <circle cx="100" cy="100" r="18" fill="var(--accent)"/>
                <circle cx="100" cy="100" r="9"  fill="var(--surface)"/>
              </g>
            </svg>
          </div>
        </div>

        <h1 class="headline">Welcome aboard</h1>
        <p class="subhead">Full Sail unlocked</p>
        <button class="cta" id="cta">Get started</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <button id="play">Replay</button>
    <button class="secondary" id="darkToggle">Toggle dark mode</button>
    <label><input type="checkbox" id="reduceMotion"/> Reduce motion</label>
  </div>

  <script>
    const scrim = document.getElementById('scrim');
    const playBtn = document.getElementById('play');
    const ctaBtn = document.getElementById('cta');
    const darkToggle = document.getElementById('darkToggle');
    const reduceMotionToggle = document.getElementById('reduceMotion');

    function play() {
      scrim.classList.remove('show');
      void scrim.offsetWidth;
      scrim.classList.add('show');
    }
    function dismiss() { scrim.classList.remove('show'); }

    playBtn.addEventListener('click', play);
    ctaBtn.addEventListener('click', dismiss);
    darkToggle.addEventListener('click', () => document.body.classList.toggle('dark'));
    reduceMotionToggle.addEventListener('change', (e) => {
      document.body.classList.toggle('reduce-motion', e.target.checked);
    });

    setTimeout(play, 400);
  </script>
</body>
</html>
