<html>
<body style="margin:0;padding:0;background-color:#F7F3EE;font-family:'Space Grotesk','Segoe UI',system-ui,-apple-system,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#F7F3EE;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background-color:#FFFFFF;border-radius:16px;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background-color:#E4572E;padding:32px 40px;text-align:center;">
              <span style="font-size:24px;font-weight:700;color:#FFFFFF;letter-spacing:0.5px;">Helm</span>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:40px;">
              <h1 style="margin:0 0 8px;font-size:22px;font-weight:700;color:#1B1F24;">Reset your password</h1>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#5C6670;">Enter this code in the app to reset your password:</p>
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding:20px 0;">
                    <span style="display:inline-block;font-size:36px;font-weight:700;letter-spacing:8px;color:#1B1F24;background-color:#F7F3EE;padding:16px 32px;border-radius:12px;">{{ .Token }}</span>
                  </td>
                </tr>
              </table>
              <p style="margin:24px 0 0;font-size:14px;line-height:1.6;color:#5C6670;">This code expires in 10 minutes. If you didn't request a password reset, you can safely ignore this email.</p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:24px 40px;border-top:1px solid #E4DDD5;">
              <p style="margin:0;font-size:12px;color:#9CA3AF;text-align:center;">Helm - The all-in-one fitness app</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
